AWSTemplateFormatVersion: '2010-09-09'
Description: 'RDS MySQL instance for Demo Shark Tank with sample data'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
    Description: Environment name
  
  VpcId:
    Type: String
    Default: vpc-06fadc1e725cc0625
    Description: Existing VPC ID
    
  SubnetId:
    Type: String
    Default: subnet-027544068fd96b43d
    Description: Subnet ID for RDS deployment
  
  DBUsername:
    Type: String
    Default: admin
    Description: Database administrator username
    
  DBPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    Description: Database administrator password
    Default: DemoShark123!

Resources:
  # DB Subnet Group (requerido por RDS)
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for RDS MySQL
      SubnetIds:
        - !Ref SubnetId
        - subnet-0b4bc0adf6f42641c
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-db-subnet-group'
        - Key: Owner
          Value: ugrosso
        - Key: EOL
          Value: 2025/12/12

  # Security Group for RDS
  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for RDS MySQL instance
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 0.0.0.0/0
          Description: MySQL access from anywhere (demo only)
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-rds-mysql-sg'
        - Key: Owner
          Value: ugrosso
        - Key: EOL
          Value: 2025/12/12



  # RDS MySQL Instance
  MySQLDatabase:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub '${Environment}-sharktank-mysql'
      DBInstanceClass: db.t3.small
      Engine: mysql
      EngineVersion: '8.0.43'
      AllocatedStorage: 20
      StorageType: gp2
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Ref DBPassword
      DBName: sharktank_demo
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup
      DBSubnetGroupName: !Ref DBSubnetGroup
      PubliclyAccessible: true
      BackupRetentionPeriod: 0
      MultiAZ: false
      StorageEncrypted: false
      DeletionProtection: false
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-sharktank-mysql'
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: ugrosso
        - Key: EOL
          Value: 2025/12/12

Outputs:
  DatabaseEndpoint:
    Description: RDS MySQL Endpoint
    Value: !GetAtt MySQLDatabase.Endpoint.Address
    Export:
      Name: !Sub '${Environment}-mysql-endpoint'
      
  DatabasePort:
    Description: RDS MySQL Port
    Value: !GetAtt MySQLDatabase.Endpoint.Port
    Export:
      Name: !Sub '${Environment}-mysql-port'
      
  DatabaseName:
    Description: Database Name
    Value: sharktank_demo
    
  ConnectionString:
    Description: MySQL Connection String
    Value: !Sub 'mysql://${DBUsername}:${DBPassword}@${MySQLDatabase.Endpoint.Address}:${MySQLDatabase.Endpoint.Port}/sharktank_demo'