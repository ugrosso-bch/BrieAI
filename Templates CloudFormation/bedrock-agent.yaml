AWSTemplateFormatVersion: '2010-09-09'
Description: 'Bedrock Agent para Demo Shark Tank con Knowledge Base existente'

Parameters:
  Environment:
    Type: String
    Default: dev
    Description: Environment name
  
  KnowledgeBaseId:
    Type: String
    Default: NZHNXOPXFT
    Description: ID de la Knowledge Base existente
  
  S3BucketName:
    Type: String
    Default: demo-bigcheese-sharktank
    Description: S3 bucket para documentos

Resources:
  # IAM Role para el Agent
  BedrockAgentRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${Environment}-sharktank-bedrock-agent-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonBedrockFullAccess
      Policies:
        - PolicyName: BedrockAgentPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:RetrieveAndGenerate
                  - bedrock:Retrieve
                Resource: '*'
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Environment}-sharktank-*'
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${S3BucketName}'
                  - !Sub 'arn:aws:s3:::${S3BucketName}/*'
      Tags:
        - Key: Owner
          Value: ugrosso
        - Key: EOL
          Value: '2025/12/12'

  # Lambda Role para Action Groups
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${Environment}-sharktank-lambda-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:UpdateItem
                Resource: !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${Environment}-sharktank-*'
        - PolicyName: SNSAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Sub 'arn:aws:sns:${AWS::Region}:${AWS::AccountId}:DemoSharkTankNotifications-${Environment}'
      Tags:
        - Key: Owner
          Value: ugrosso
        - Key: EOL
          Value: '2025/12/12'

  # Lambda Function para Database Queries
  DatabaseQueryFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${Environment}-sharktank-database-query'
      Runtime: python3.11
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          DB_CONNECTIONS_TABLE: !Sub '${Environment}-sharktank-db-connections'
          MYSQL_HOST: dev-sharktank-mysql.ctowvzhuzenn.us-east-1.rds.amazonaws.com
          MYSQL_USER: admin
          MYSQL_PASSWORD: DemoShark123!
          MYSQL_DATABASE: sharktank_demo
      Tags:
        - Key: Owner
          Value: ugrosso
        - Key: EOL
          Value: '2025/12/12'
      Code:
        ZipFile: |
          import json
          import boto3
          import pymysql
          import os
          
          def lambda_handler(event, context):
              try:
                  # Extraer parámetros del evento
                  parameters = event.get('parameters', [])
                  query = next((p['value'] for p in parameters if p['name'] == 'query'), None)
                  connection_id = next((p['value'] for p in parameters if p['name'] == 'connectionId'), 'default')
                  
                  if not query:
                      return {
                          'response': {
                              'actionGroup': event['actionGroup'],
                              'function': event['function'],
                              'functionResponse': {
                                  'responseBody': {
                                      'TEXT': {
                                          'body': 'Error: Query parameter is required'
                                      }
                                  }
                              }
                          }
                      }
                  
                  # Conectar a MySQL (usando conexión por defecto)
                  connection = pymysql.connect(
                      host=os.environ['MYSQL_HOST'],
                      user=os.environ['MYSQL_USER'],
                      password=os.environ['MYSQL_PASSWORD'],
                      database=os.environ['MYSQL_DATABASE'],
                      cursorclass=pymysql.cursors.DictCursor
                  )
                  
                  with connection:
                      with connection.cursor() as cursor:
                          cursor.execute(query)
                          results = cursor.fetchall()
                          
                  return {
                      'response': {
                          'actionGroup': event['actionGroup'],
                          'function': event['function'],
                          'functionResponse': {
                              'responseBody': {
                                  'TEXT': {
                                      'body': json.dumps(results, default=str)
                                  }
                              }
                          }
                      }
                  }
                  
              except Exception as e:
                  return {
                      'response': {
                          'actionGroup': event['actionGroup'],
                          'function': event['function'],
                          'functionResponse': {
                              'responseBody': {
                                  'TEXT': {
                                      'body': f'Error executing query: {str(e)}'
                                  }
                              }
                          }
                      }
                  }

  # Lambda Function para Schema Analysis
  SchemaAnalysisFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${Environment}-sharktank-schema-analysis'
      Runtime: python3.11
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          MYSQL_HOST: dev-sharktank-mysql.ctowvzhuzenn.us-east-1.rds.amazonaws.com
          MYSQL_USER: admin
          MYSQL_PASSWORD: DemoShark123!
          MYSQL_DATABASE: sharktank_demo
      Tags:
        - Key: Owner
          Value: ugrosso
        - Key: EOL
          Value: '2025/12/12'
      Code:
        ZipFile: |
          import json
          import pymysql
          import os
          
          def lambda_handler(event, context):
              try:
                  connection = pymysql.connect(
                      host=os.environ['MYSQL_HOST'],
                      user=os.environ['MYSQL_USER'],
                      password=os.environ['MYSQL_PASSWORD'],
                      database=os.environ['MYSQL_DATABASE'],
                      cursorclass=pymysql.cursors.DictCursor
                  )
                  
                  with connection:
                      with connection.cursor() as cursor:
                          cursor.execute("SHOW TABLES")
                          tables = cursor.fetchall()
                          
                          schema_info = {}
                          for table in tables:
                              table_name = list(table.values())[0]
                              cursor.execute(f"DESCRIBE {table_name}")
                              columns = cursor.fetchall()
                              schema_info[table_name] = columns
                  
                  return {
                      'response': {
                          'actionGroup': event['actionGroup'],
                          'function': event['function'],
                          'functionResponse': {
                              'responseBody': {
                                  'TEXT': {
                                      'body': json.dumps(schema_info, default=str)
                                  }
                              }
                          }
                      }
                  }
                  
              except Exception as e:
                  return {
                      'response': {
                          'actionGroup': event['actionGroup'],
                          'function': event['function'],
                          'functionResponse': {
                              'responseBody': {
                                  'TEXT': {
                                      'body': f'Error getting schema: {str(e)}'
                                  }
                              }
                          }
                      }
                  }

  # Bedrock Agent
  SharkTankAgent:
    Type: AWS::Bedrock::Agent
    Properties:
      AgentName: !Sub '${Environment}-sharktank-agent'
      Description: 'Agente inteligente para Demo Shark Tank con capacidades de consulta de DB y base de conocimiento'
      FoundationModel: 'anthropic.claude-3-5-sonnet-20240620-v1:0'
      Instruction: |
        Eres un asistente inteligente para Demo Shark Tank, una plataforma de análisis de datos.
        
        Tienes acceso a:
        1. Una base de datos MySQL con información de empresas, inversores y transacciones
        2. Una base de conocimiento con documentos y archivos subidos por usuarios
        
        Capacidades:
        - Ejecutar consultas SQL para obtener datos específicos
        - Analizar esquemas de base de datos
        - Buscar información en documentos de la base de conocimiento
        - Proporcionar análisis y insights basados en los datos
        
        Siempre:
        - Sé preciso y profesional
        - Explica tus análisis de forma clara
        - Sugiere consultas SQL optimizadas cuando sea apropiado
        - Usa la base de conocimiento para contexto adicional
      AgentResourceRoleArn: !GetAtt BedrockAgentRole.Arn
      KnowledgeBases:
        - KnowledgeBaseId: !Ref KnowledgeBaseId
          Description: 'Base de conocimiento con documentos subidos'
          KnowledgeBaseState: ENABLED
      Tags:
        Owner: ugrosso
        EOL: '2025/12/12'
      ActionGroups:
        - ActionGroupName: 'DatabaseOperations'
          Description: 'Operaciones de base de datos'
          ActionGroupState: ENABLED
          ActionGroupExecutor:
            Lambda: !GetAtt DatabaseQueryFunction.Arn
          ApiSchema:
            Payload: |
              {
                "openapi": "3.0.0",
                "info": {
                  "title": "Database Operations",
                  "version": "1.0.0"
                },
                "paths": {
                  "/executeQuery": {
                    "post": {
                      "description": "Execute a SQL query",
                      "operationId": "executeQuery",
                      "requestBody": {
                        "required": true,
                        "content": {
                          "application/json": {
                            "schema": {
                              "type": "object",
                              "properties": {
                                "query": {
                                  "type": "string",
                                  "description": "SQL query to execute"
                                }
                              },
                              "required": ["query"]
                            }
                          }
                        }
                      },
                      "responses": {
                        "200": {
                          "description": "Success"
                        }
                      }
                    }
                  }
                }
              }
        - ActionGroupName: 'SchemaAnalysis'
          Description: 'Análisis de esquemas de base de datos'
          ActionGroupState: ENABLED
          ActionGroupExecutor:
            Lambda: !GetAtt SchemaAnalysisFunction.Arn
          ApiSchema:
            Payload: |
              {
                "openapi": "3.0.0",
                "info": {
                  "title": "Schema Analysis",
                  "version": "1.0.0"
                },
                "paths": {
                  "/getSchema": {
                    "get": {
                      "description": "Get database schema",
                      "operationId": "getSchema",
                      "responses": {
                        "200": {
                          "description": "Success"
                        }
                      }
                    }
                  }
                }
              }

  # Permisos para que Bedrock invoque las Lambda functions
  DatabaseQueryPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref DatabaseQueryFunction
      Action: lambda:InvokeFunction
      Principal: bedrock.amazonaws.com
      SourceArn: !Sub 'arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:agent/*'

  SchemaAnalysisPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SchemaAnalysisFunction
      Action: lambda:InvokeFunction
      Principal: bedrock.amazonaws.com
      SourceArn: !Sub 'arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:agent/*'

Outputs:
  AgentId:
    Description: 'ID del Bedrock Agent creado'
    Value: !Ref SharkTankAgent
    Export:
      Name: !Sub '${Environment}-sharktank-agent-id'
  
  AgentArn:
    Description: 'ARN del Bedrock Agent'
    Value: !Sub 'arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:agent/${SharkTankAgent}'
    Export:
      Name: !Sub '${Environment}-sharktank-agent-arn'
  
  DatabaseQueryFunctionArn:
    Description: 'ARN de la función Lambda para consultas de DB'
    Value: !GetAtt DatabaseQueryFunction.Arn
    Export:
      Name: !Sub '${Environment}-sharktank-db-query-function-arn'