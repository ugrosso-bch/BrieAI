<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Cache Cleared - BrieAI</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
</head>
<body>
    <h1>Cache Cleared</h1>
    <p>BrieAI cache has been cleared. <a href="/">Return to app</a></p>
    <script>
        setTimeout(() => {
            window.location.href = '/';
        }, 2000);
    </script>
</body>
</html>
